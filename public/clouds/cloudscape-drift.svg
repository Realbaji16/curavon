<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <radialGradient id="wPuff" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.58"/>
      <stop offset="55%" stop-color="#EEF4FA" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#A0B4C8" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="wShade" x1="450" y1="110" x2="450" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8098B0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#506878" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="wRough" x="-28%" y="-20%" width="156%" height="175%">
      <feTurbulence type="fractalNoise" baseFrequency="0.024" numOctaves="4" seed="12" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="18" xChannelSelector="R" yChannelSelector="G" result="w"/>
      <feGaussianBlur in="w" stdDeviation="0.5"/>
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#506878" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#6888A0" flood-opacity="0.32"/>
    </filter>
    <filter id="wBlur"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <ellipse cx="450" cy="248" rx="410" ry="36" fill="#4A6078" fill-opacity="0.26" filter="url(#wBlur)"/>

  <g filter="url(#wRough)" fill="url(#wPuff)" opacity="0.9">
    <ellipse cx="175" cy="178" rx="125" ry="44"/>
    <circle cx="102" cy="160" r="46"/>
    <circle cx="168" cy="138" r="50"/>
    <circle cx="245" cy="148" r="42"/>
    <ellipse cx="448" cy="168" rx="148" ry="48"/>
    <circle cx="375" cy="148" r="48"/>
    <circle cx="448" cy="126" r="54"/>
    <circle cx="532" cy="142" r="44"/>
    <ellipse cx="725" cy="182" rx="122" ry="42"/>
    <circle cx="662" cy="162" r="44"/>
    <circle cx="728" cy="140" r="48"/>
    <circle cx="798" cy="166" r="38"/>
  </g>

  <ellipse cx="450" cy="208" rx="370" ry="38" fill="url(#wShade)" fill-opacity="0.65"/>
</svg>
