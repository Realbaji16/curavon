<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" fill="none">
  <defs>
    <radialGradient id="puffLight" cx="38%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.62"/>
      <stop offset="50%" stop-color="#F4F8FC" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#B0C0D4" stop-opacity="0.22"/>
    </radialGradient>
    <radialGradient id="puffMid" cx="42%" cy="34%" r="65%">
      <stop offset="0%" stop-color="#FAFCFF" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#E4ECF6" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#98AEC4" stop-opacity="0.18"/>
    </radialGradient>
    <linearGradient id="bellyShade" x1="450" y1="130" x2="450" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#90A4BC" stop-opacity="0"/>
      <stop offset="60%" stop-color="#7088A4" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#506878" stop-opacity="0.48"/>
    </linearGradient>
    <filter id="rough" x="-30%" y="-20%" width="160%" height="180%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="5" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G" result="warp"/>
      <feGaussianBlur in="warp" stdDeviation="0.6" result="soft"/>
      <feDropShadow in="soft" dx="0" dy="20" stdDeviation="24" flood-color="#506878" flood-opacity="0.55" result="shadow"/>
      <feDropShadow in="soft" dx="0" dy="8" stdDeviation="10" flood-color="#6888A0" flood-opacity="0.35" result="shadow2"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="shadow2"/>
        <feMergeNode in="soft"/>
      </feMerge>
    </filter>
    <filter id="shadowOnly" x="-20%" y="-10%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- cast shadow on sky -->
  <ellipse cx="450" cy="292" rx="440" ry="42" fill="#4A6078" fill-opacity="0.28" filter="url(#shadowOnly)"/>
  <ellipse cx="450" cy="278" rx="380" ry="28" fill="#5A7490" fill-opacity="0.22" filter="url(#shadowOnly)"/>

  <g filter="url(#rough)" opacity="0.92">
    <g fill="url(#puffMid)">
      <ellipse cx="115" cy="222" rx="98" ry="50"/>
      <ellipse cx="205" cy="200" rx="92" ry="54"/>
      <ellipse cx="298" cy="182" rx="106" ry="60"/>
      <ellipse cx="398" cy="168" rx="114" ry="64"/>
      <ellipse cx="502" cy="162" rx="112" ry="66"/>
      <ellipse cx="605" cy="170" rx="104" ry="60"/>
      <ellipse cx="698" cy="186" rx="96" ry="54"/>
      <ellipse cx="782" cy="206" rx="88" ry="48"/>
    </g>
    <g fill="url(#puffLight)">
      <circle cx="78" cy="188" r="54"/>
      <circle cx="150" cy="156" r="60"/>
      <circle cx="232" cy="134" r="64"/>
      <circle cx="318" cy="120" r="68"/>
      <circle cx="408" cy="112" r="70"/>
      <circle cx="502" cy="108" r="72"/>
      <circle cx="596" cy="116" r="68"/>
      <circle cx="682" cy="130" r="62"/>
      <circle cx="762" cy="154" r="56"/>
      <circle cx="828" cy="178" r="50"/>
    </g>
    <ellipse cx="450" cy="228" rx="405" ry="46" fill="url(#puffMid)" fill-opacity="0.88"/>
    <ellipse cx="450" cy="252" rx="385" ry="50" fill="url(#bellyShade)" fill-opacity="0.9"/>
  </g>
</svg>
