name: CI

on:
  push:
    branches: [main, master, paul/dev]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
        env:
          APP_ENV: test
          NEXT_PUBLIC_APP_ENV: test
          NEXT_PUBLIC_AUTH_MODE: local_demo
